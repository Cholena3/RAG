name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docmind
          POSTGRES_PASSWORD: docmind_secret
          POSTGRES_DB: docmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docmind/backend/requirements.txt

      - name: Install dependencies
        working-directory: docmind/backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: docmind/backend
        env:
          DATABASE_URL: postgresql+asyncpg://docmind:docmind_secret@localhost:5432/docmind_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          CHROMA_HOST: localhost
          CHROMA_PORT: "8100"
          OLLAMA_BASE_URL: http://localhost:11434
          SECRET_KEY: test-secret-key
        run: python -m pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: docmind/backend/coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docmind/frontend/package-lock.json

      - name: Install dependencies
        working-directory: docmind/frontend
        run: npm ci

      - name: Lint
        working-directory: docmind/frontend
        run: npm run lint

      - name: Build
        working-directory: docmind/frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        working-directory: docmind/backend
        run: docker build -t docmind-backend:${{ github.sha }} .

      - name: Build frontend image
        working-directory: docmind/frontend
        run: docker build -t docmind-frontend:${{ github.sha }} .
